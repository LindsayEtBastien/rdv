<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Our Date</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: linear-gradient(to bottom, #fbeae7, #f77f7f);
            color: #333;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #f44141;
            color: white;
            padding: 30px 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        header h1 {
            font-size: 2.5em;
            margin: 0;
        }
        main {
            padding: 20px;
        }
        form {
            margin: 20px auto;
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
        }
        button {
            background-color: #f44141;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #d93737;
        }
        section {
            display: none;
        }
        section.active {
            display: block;
        }
        footer {
            margin-top: 20px;
            padding: 10px 0;
            background-color: #333;
            color: white;
        }
        .card {
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 20px;
            margin: 10px;
            text-align: left;
            background: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .card img {
            max-width: 100%;
            border-radius: 10px;
        }
        .card h3 {
            margin: 10px 0;
        }
        .card.selected {
            border-color: #f44141;
        }
    </style>
</head>
<body>
    <header>
        <h1>Plan Our Date ❤️</h1>
    </header>
    <main>
        <section id="step1" class="active">
            <h2>Select a Date</h2>
            <form id="dateForm">
                <label for="date">Choose a date:</label>
                <input type="date" id="date" name="date" required>
                <button type="button" onclick="goToStep2()">Next</button>
            </form>
        </section>

        <section id="step2">
            <h2>Choose Restaurants</h2>
            <div id="restaurantCards">
                <div class="card" onclick="toggleSelection(this, 'Italian Bistro')">
                    <img src="imgs/italien.png" alt="Italian Bistro">
                    <h3>Italian Bistro</h3>
                </div>
                <div class="card" onclick="toggleSelection(this, 'Sushi Palace')">
                    <img src="imgs/sushi_palace.jpg" alt="Sushi Palace">
                    <h3>Sushi Palace</h3>
                </div>
                <div class="card" onclick="toggleSelection(this, 'French Café')">
                    <img src="imgs/french_cafe.jpg" alt="French Café">
                    <h3>French Café</h3>
                </div>
                <div class="card" onclick="toggleSelection(this, 'Steakhouse Deluxe')">
                    <img src="imgs/steakhouse_deluxe.jpg" alt="Steakhouse Deluxe">
                    <h3>Steakhouse Deluxe</h3>
                </div>
            </div>
            <button type="button" onclick="goToConfirmation()">Next</button>
        </section>

        <section id="confirmation">
            <h2>Confirm Your Choices</h2>
            <form id="finalForm">
                <p><strong>Date:</strong> <span id="selectedDate"></span></p>
                <p><strong>Restaurants (in order of priority):</strong> <span id="selectedRestaurants"></span></p>
                <input type="hidden" name="date" id="hiddenDate">
                <input type="hidden" name="restaurants" id="hiddenRestaurants">
                <button type="button" onclick="submitForm()">Submit</button>
            </form>
        </section>

        <section id="thankYou">
            <h2>Thank You! ❤️</h2>
            <p>We’ll see each other on <span id="finalDate"></span> at <span id="finalRestaurants"></span>.</p>
        </section>
    </main>

    <footer>
        <p>Made with ❤️ for someone special</p>
    </footer>

    <script>
        let selectedRestaurants = [];

        function goToStep2() {
            const date = document.getElementById('date').value;
            if (!date) {
                alert('Please select a date!');
                return;
            }

            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }

        function toggleSelection(card, restaurant) {
            card.classList.toggle('selected');
            if (card.classList.contains('selected')) {
                selectedRestaurants.push(restaurant);
            } else {
                selectedRestaurants = selectedRestaurants.filter(r => r !== restaurant);
            }
        }

        function goToConfirmation() {
            if (selectedRestaurants.length === 0) {
                alert('Please select at least one restaurant!');
                return;
            }

            const date = document.getElementById('date').value;

            document.getElementById('selectedDate').textContent = date;
            document.getElementById('selectedRestaurants').textContent = selectedRestaurants.join(', ');
            document.getElementById('hiddenDate').value = date;
            document.getElementById('hiddenRestaurants').value = selectedRestaurants.join(', ');

            document.getElementById('step2').classList.remove('active');
            document.getElementById('confirmation').classList.add('active');
        }

        async function submitForm() {
            const date = document.getElementById('hiddenDate').value;
            const restaurants = document.getElementById('hiddenRestaurants').value;

            if (!date || !restaurants) {
                alert('Missing data. Please complete all steps.');
                return;
            }

            const formData = new FormData();
            formData.append('date', date);
            formData.append('restaurants', restaurants);
            formData.append('_subject', 'New Date Submission!');

            try {
                const response = await fetch('https://formspree.io/f/mzzbqwjb', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json',
                    },
                });

                if (response.ok) {
                    document.getElementById('finalDate').textContent = date;
                    document.getElementById('finalRestaurants').textContent = restaurants;

                    document.getElementById('confirmation').classList.remove('active');
                    document.getElementById('thankYou').classList.add('active');
                } else {
                    alert('Failed to send your submission. Please try again later.');
                }
            } catch (error) {
                console.error('Error submitting form:', error);
                alert('An error occurred. Please try again.');
            }
        }
    </script>
</body>
</html>
