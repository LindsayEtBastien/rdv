<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATClub Swipe</title>
    <style>
        /* Styles globaux */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
            overflow: hidden;
        }

        .card-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 70%;
            overflow: hidden;
            background: none;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, opacity 0.3s ease;
            will-change: transform;
        }

        .card img {
            width: 80%;
            border-radius: 10px;
            margin-top: 20px;
        }

        .card h2 {
            font-size: 1.5em;
            margin: 15px 0;
        }

        .feedback {
            position: absolute;
            top: 50px;
            font-size: 3em;
            font-weight: bold;
            opacity: 0;
            color: white;
            pointer-events: none;
            transform: scale(0.8);
            transition: opacity 0.3s, transform 0.3s ease;
        }

        .feedback.like {
            left: 20px;
            transform: rotate(-20deg);
        }

        .controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
        }

        .button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            font-size: 1.5em;
            color: gray;
            transition: transform 0.2s ease;
        }

        .button.like {
            color: green;
        }

        .button.nope {
            color: red;
        }

        /* Styles pour les pages de date et restaurants */
        section {
            display: none;
            text-align: center;
        }
        section.active {
            display: block;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #f44141;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover {
            background-color: #d93737;
        }

        .email-section {
            margin-top: 20px;
        }

        .email-section input {
            width: 80%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Carte Swiping -->
        <div class="card-container" id="cardContainer">
            <div class="card" data-index="1" data-name="Mel">
                <div class="feedback like">LIKE</div>
                <img src="https://via.placeholder.com/150" alt="Profile Picture">
                <h2>Mel, 25 ans</h2>
                <p>Paris</p>
            </div>
            <div class="card" data-index="2">
                <div class="feedback like">LIKE</div>
                <img src="https://via.placeholder.com/150" alt="Profile Picture">
                <h2>Hina, 20 ans</h2>
                <p>Paris</p>
            </div>
        </div>
        <div class="controls">
            <div class="button nope" id="nopeButton">&#10006;</div>
            <div class="button like" id="likeButton">&#10084;</div>
        </div>

        <!-- Page Choix de la date -->
        <section id="datePage">
            <h2>Choix de la date</h2>
            <label for="date">Choisie une date :</label>
            <input type="date" id="date" required>
            <button onclick="goToRestaurantPage()">Suivant</button>
        </section>

        <!-- Page Choix des restaurants -->
        <section id="restaurantPage">
            <h2>Choix du restaurant</h2>
            <p>Sélectionne un restaurant pour notre date</p>
            <div>
                <button onclick="finalStep('Restaurant Italien')">Restaurant Italien</button>
                <button onclick="finalStep('Restaurant Japonais')">Restaurant Japonais</button>
                <button onclick="finalStep('Restaurant Coréen')">Restaurant Coréen</button>
                <button onclick="finalStep('Restaurant Américain')">Restaurant Américain</button>
            </div>
        </section>

        <!-- Page Envoi de mail -->
        <section id="emailPage">
            <h2>Envoi de l'invitation</h2>
            <div class="email-section">
                <input type="email" id="email" placeholder="Entrez votre email" required>
                <button onclick="sendEmail()">Envoyer</button>
            </div>
        </section>
    </div>

    <script>
        const cards = document.querySelectorAll('.card');
        const likeButton = document.getElementById('likeButton');
        const nopeButton = document.getElementById('nopeButton');
        let currentCardIndex = cards.length - 1;

        let startX = 0;
        let currentX = 0;
        let isDragging = false;

        cards.forEach((card) => {
            card.addEventListener('touchstart', (e) => startDrag(e.touches[0].clientX));
            card.addEventListener('touchmove', (e) => drag(e.touches[0].clientX));
            card.addEventListener('touchend', endDrag);

            card.addEventListener('mousedown', (e) => startDrag(e.clientX));
            card.addEventListener('mousemove', (e) => drag(e.clientX));
            card.addEventListener('mouseup', endDrag);
            card.addEventListener('mouseleave', endDrag);
        });

        function startDrag(x) {
            isDragging = true;
            startX = x;
        }

        function drag(x) {
            if (!isDragging) return;
            currentX = x;
            const deltaX = currentX - startX;
            const card = cards[currentCardIndex];
            if (!card) return;
            card.style.transform = `translateX(${deltaX}px)`;
        }

        function endDrag() {
            if (!isDragging) return;
            isDragging = false;
            const deltaX = currentX - startX;
            const card = cards[currentCardIndex];
            if (!card) return;

            if (deltaX > 150) {
                swipeRight(card);
            } else if (deltaX < -150) {
                swipeLeft(card);
            } else {
                card.style.transform = '';
            }
        }

        function swipeRight(card) {
            const name = card.dataset.name;
            card.style.transform = 'translate(1000px, 0) rotate(30deg)';
            card.style.opacity = '0';

            if (name === 'Mel') {
                setTimeout(() => showDatePage(), 300);
            }
        }

        function swipeLeft(card) {
            card.style.transform = 'translate(-1000px, 0) rotate(-30deg)';
            card.style.opacity = '0';
        }

        likeButton.addEventListener('click', () => {
            const currentCard = cards[currentCardIndex];
            if (!currentCard) return;
            swipeRight(currentCard);
            currentCardIndex--;
        });

        nopeButton.addEventListener('click', () => {
            const currentCard = cards[currentCardIndex];
            if (!currentCard) return;
            swipeLeft(currentCard);
            currentCardIndex--;
        });

        function showDatePage() {
            document.getElementById('cardContainer').style.display = 'none';
            document.getElementById('datePage').classList.add('active');
        }

        function goToRestaurantPage() {
            const date = document.getElementById('date').value;
            if (!date) {
                alert('Veuillez choisir une date');
                return;
            }
            document.getElementById('datePage').classList.remove('active');
            document.getElementById('restaurantPage').classList.add('active');
        }

        function finalStep(restaurant) {
            document.getElementById('restaurantPage').classList.remove('active');
            document.getElementById('emailPage').classList.add('active');
        }

        function sendEmail() {
            const email = document.getElementById('email').value;
            if (!email) {
                alert('Veuillez entrer un email');
                return;
            }

            const mailtoLink = `mailto:${email}?subject=Invitation à notre rendez-vous&body=J'ai choisi un restaurant pour notre rendez-vous!`;
            window.location.href = mailtoLink;
        }
    </script>
</body>
</html>
