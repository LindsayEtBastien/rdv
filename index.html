<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notre date</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: linear-gradient(to bottom, #fbeae7, #f77f7f);
            color: #333;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #f44141;
            color: white;
            padding: 30px 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        header h1 {
            font-size: 2.5em;
            margin: 0;
        }
        main {
            padding: 20px;
        }
        form {
            margin: 20px auto;
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
        }
        button {
            background-color: #f44141;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #d93737;
        }
        section {
            display: none;
        }
        section.active {
            display: block;
        }
        footer {
            margin-top: 20px;
            padding: 10px 0;
            background-color: #333;
            color: white;
        }
        .card-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .card {
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 20px;
            margin: 10px;
            text-align: left;
            background: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.3s ease, border-color 0.3s ease, background-color 0.3s ease;
            flex: 1 1 calc(50% - 40px); /* Adjust the width to fit two cards per row */
            max-width: calc(50% - 40px); /* Adjust the width to fit two cards per row */
        }
        .card:hover {
            transform: scale(1.05);
        }
        .card img {
            max-width: 100%;
            border-radius: 10px;
        }
        .card h3 {
            margin: 10px 0;
        }
        .card.selected {
            border: 4px solid #f44141; /* Bordure plus épaisse */
            background-color: #ffe6e6;
        }
    </style>
</head>
<body>
    <header>
        <h1>Planifier notre date</h1>
    </header>
    <main>
        <section id="step1" class="active">
            <h2>Choix de la date</h2>
            <form id="dateForm">
                <label for="date">Choisie une date : </label>
                <input type="date" id="date" name="date" required>
                <button type="button" onclick="goToStep2()">Suivant</button>
            </form>
        </section>

        <section id="step2">
            <h2>Choix du restaurant</h2>
            <div class="card-container" id="restaurantCards">
                <div class="card" onclick="toggleSelection(this, 'Restaurant Italien')">
                    <img src="imgs/italien.png" alt="Restaurant Italien">
                    <h3>Restaurant Italien</h3>
                </div>
                <div class="card" onclick="toggleSelection(this, 'Restaurant Japonnais')">
                    <img src="imgs/sushis.jpg" alt="Restaurant Japonnais">
                    <h3>Restaurant Japonnais</h3>
                </div>
                <div class="card" onclick="toggleSelection(this, 'Restaurant Coréen')">
                    <img src="imgs/coreen.jpg" alt="Restaurant Coréen">
                    <h3>Restaurant Coréen</h3>
                </div>
                <div class="card" onclick="toggleSelection(this, 'Restaurant Américain')">
                    <img src="imgs/americain.jpg" alt="Restaurant Américain">
                    <h3>Restaurant Américain</h3>
                </div>
            </div>
            <button type="button" onclick="goToConfirmation()">Suivant</button>
        </section>

        <section id="confirmation">
            <h2>Confirmation</h2>
            <form id="finalForm">
                <p><strong>Date :</strong> <span id="selectedDate"></span></p>
                <p><strong>Restaurants (dans l'ordre de sélection):</strong> <span id="selectedRestaurants"></span></p>
                <input type="hidden" name="date" id="hiddenDate">
                <input type="hidden" name="restaurants" id="hiddenRestaurants">
                <button type="button" onclick="submitForm()">Envoyer</button>
            </form>
        </section>

        <section id="thankYou">
            <h2>Merci!</h2>
            <p>On se voit le <span id="finalDate"></span> dans un <span id="finalRestaurants"></span> </p>
        </section>
    </main>

    <footer>
        <p>Fait avec ❤️</p>
    </footer>

    <script>
        let selectedRestaurants = [];

        function goToStep2() {
            const date = document.getElementById('date').value;
            if (!date) {
                alert('Veuillez sélectionner une date!');
                return;
            }

            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }

        function toggleSelection(card, restaurant) {
            card.classList.toggle('selected');
            if (card.classList.contains('selected')) {
                selectedRestaurants.push(restaurant);
            } else {
                selectedRestaurants = selectedRestaurants.filter(r => r !== restaurant);
            }
        }

        function goToConfirmation() {
            if (selectedRestaurants.length === 0) {
                alert('Veuillez sélectionner au moins un restaurant!');
                return;
            }

            const date = document.getElementById('date').value;

            document.getElementById('selectedDate').textContent = date;
            document.getElementById('selectedRestaurants').textContent = selectedRestaurants.join(', ');
            document.getElementById('hiddenDate').value = date;
            document.getElementById('hiddenRestaurants').value = selectedRestaurants.join(', ');

            document.getElementById('step2').classList.remove('active');
            document.getElementById('confirmation').classList.add('active');
        }

        async function submitForm() {
            const date = document.getElementById('hiddenDate').value;
            const restaurants = document.getElementById('hiddenRestaurants').value;

            if (!date || !restaurants) {
                alert('Données manquantes. Veuillez compléter toutes les étapes.');
                return;
            }

            const formData = new FormData();
            formData.append('date', date);
            formData.append('restaurants', restaurants);
            formData.append('_subject', 'Nouvelle soumission de date!');

            try {
                const response = await fetch('https://formspree.io/f/mzzbqwjb', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json',
                    },
                });

                if (response.ok) {
                    document.getElementById('finalDate').textContent = date;
                    document.getElementById('finalRestaurants').textContent = restaurants;

                    document.getElementById('confirmation').classList.remove('active');
                    document.getElementById('thankYou').classList.add('active');
                } else {
                    alert('Échec de l\'envoi de votre soumission. Veuillez réessayer plus tard.');
                }
            } catch (error) {
                console.error('Erreur lors de l\'envoi du formulaire:', error);
                alert('Une erreur s\'est produite. Veuillez réessayer.');
            }
        }
    </script>
</body>
</html>
