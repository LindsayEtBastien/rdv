<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tinder-Like</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
            overflow: hidden;
        }

        .card-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 70%;
            overflow: hidden;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .card img {
            width: 80%;
            border-radius: 10px;
            margin-top: 20px;
        }

        .card h2 {
            font-size: 1.5em;
            margin: 15px 0;
        }

        .card p {
            color: #777;
            font-size: 1em;
        }

        .feedback {
            position: absolute;
            top: 50px;
            font-size: 3em;
            font-weight: bold;
            opacity: 0;
            color: white;
            pointer-events: none;
            transform: scale(0.8);
            transition: opacity 0.3s, transform 0.3s ease;
        }

        .feedback.like {
            left: 20px;
            transform: rotate(-20deg);
        }

        .feedback.nope {
            right: 20px;
            transform: rotate(20deg);
        }

        .background-like {
            background: rgba(102, 255, 102, 0.4); /* Vert clair */
        }

        .background-nope {
            background: rgba(255, 102, 102, 0.4); /* Rouge clair */
        }

        .controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
        }

        .button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            font-size: 1.5em;
            color: gray;
            transition: transform 0.2s ease;
        }

        .button:hover {
            transform: scale(1.1);
        }

        .button.like {
            color: green;
        }

        .button.nope {
            color: red;
        }

        .match-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 0, 0, 0.8);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3em;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .heart-explosion {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: url('https://i.imgur.com/kpAKx6s.gif') no-repeat center center;
            background-size: contain;
            opacity: 0;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="card-container" id="cardContainer">
        <div class="card" data-index="1">
            <div class="feedback like">LIKE</div>
            <div class="feedback nope">NOPE</div>
            <img src="https://via.placeholder.com/150" alt="Profile Picture">
            <h2>Mel, 25 ans</h2>
            <p>Paris</p>
        </div>
        <div class="card" data-index="2">
            <div class="feedback like">LIKE</div>
            <div class="feedback nope">NOPE</div>
            <img src="https://via.placeholder.com/150" alt="Profile Picture">
            <h2>Hina, 20 ans</h2>
            <p>Paris</p>
        </div>
        <div class="card" data-index="3" data-id="special">
            <div class="feedback like">LIKE</div>
            <div class="feedback nope">NOPE</div>
            <img src="https://via.placeholder.com/150" alt="Profile Picture">
            <h2>Noah, 24 ans</h2>
            <p>Paris</p>
        </div>
    </div>

    <div class="controls">
        <div class="button nope" id="nopeButton">✖</div>
        <div class="button like" id="likeButton">👍</div>
    </div>

    <div class="match-screen" id="matchScreen">
        MATCH! 🎉
    </div>

    <div class="heart-explosion" id="heartExplosion"></div>

    <script>
        const cardContainer = document.getElementById('cardContainer');
        const cards = Array.from(document.querySelectorAll('.card'));
        const likeButton = document.getElementById('likeButton');
        const nopeButton = document.getElementById('nopeButton');
        const matchScreen = document.getElementById('matchScreen');
        const heartExplosion = document.getElementById('heartExplosion');
        let currentCardIndex = 0;

        function swipe(direction) {
            const card = cards[currentCardIndex];
            card.style.transition = "transform 0.3s ease, opacity 0.3s ease";

            if (direction === 'right') {
                card.style.transform = "translate(1000px, 0) rotate(30deg)";
                if (card.dataset.id === 'special') {
                    triggerHeartExplosion();
                }
            } else {
                card.style.transform = "translate(-1000px, 0) rotate(-30deg)";
            }

            card.style.opacity = "0";
            card.addEventListener('transitionend', () => {
                card.remove();
                currentCardIndex++;
            });
        }

        function triggerHeartExplosion() {
            heartExplosion.style.opacity = "1";
            setTimeout(() => {
                heartExplosion.style.opacity = "0";
                matchScreen.style.opacity = "1";
                setTimeout(() => window.location.href = "mailto:test@gmail.com", 2000);
            }, 2000);
        }

        likeButton.addEventListener('click', () => swipe('right'));
        nopeButton.addEventListener('click', () => swipe('left'));
    </script>
</body>
</html>
