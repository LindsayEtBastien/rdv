<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tinder-Like</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(to bottom, #f77f7f, #fbeae7);
            overflow: hidden;
        }

        .card-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 60%;
        }

        .card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, opacity 0.3s ease;
            will-change: transform, opacity;
        }

        .card img {
            width: 80%;
            height: auto;
            border-radius: 50%;
            margin-bottom: 20px;
        }

        .card h2 {
            margin: 10px 0;
            font-size: 1.5em;
            color: #333;
        }

        .card p {
            font-size: 1em;
            color: #555;
        }

        .button-container {
            position: absolute;
            bottom: 20px;
            display: flex;
            justify-content: space-between;
            width: 60%;
        }

        .button {
            background: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .button:hover {
            transform: scale(1.1);
        }

        .button i {
            font-size: 1.5em;
            color: #f44141;
        }

        .button.match i {
            color: #6bfb6b;
        }
    </style>
</head>
<body>
    <div class="card-container" id="cardContainer">
        <div class="card" data-index="3">
            <img src="imgs/henry.jpg" alt="Profile Picture">
            <h2>Nom Prénom 3</h2>
            <p>Âge: 30</p>
        </div>
        <div class="card" data-index="2">
            <img src="imgs/profile2.jpg" alt="Profile Picture">
            <h2>Nom Prénom 2</h2>
            <p>Âge: 28</p>
        </div>
        <div class="card" data-index="1">
            <img src="imgs/henry.jpg" alt="Profile Picture">
            <h2>Nom Prénom 1</h2>
            <p>Âge: 25</p>
        </div>
    </div>
    <div class="button-container">
        <button class="button reject" onclick="swipe('left')"><i class="fas fa-times"></i></button>
        <button class="button match" onclick="swipe('right')"><i class="fas fa-heart"></i></button>
    </div>

    <script>
        const cardContainer = document.getElementById('cardContainer');
        const cards = Array.from(document.querySelectorAll('.card'));
        let currentCardIndex = cards.length - 1;

        function swipe(direction) {
            if (currentCardIndex < 0) return;

            const card = cards[currentCardIndex];
            card.style.transition = "transform 0.3s ease, opacity 0.3s ease";

            if (direction === 'right') {
                card.style.transform = "translate(1000px, 0) rotate(30deg)";
            } else {
                card.style.transform = "translate(-1000px, 0) rotate(-30deg)";
            }

            card.style.opacity = "0";

            currentCardIndex--;
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
</body>
</html>
