<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swipe App</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #f77f7f, #fbeae7);
            overflow: hidden;
        }

        .card-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 70%;
        }

        .card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, opacity 0.3s ease;
            will-change: transform, opacity;
            cursor: grab;
        }

        .card img {
            width: 80%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .card h2 {
            margin: 10px 0;
            font-size: 1.5em;
            color: #333;
        }

        .card p {
            font-size: 1em;
            color: #555;
        }

        .card:nth-child(2) {
            transform: translateY(20px) scale(0.95);
        }

        .card:nth-child(3) {
            transform: translateY(40px) scale(0.9);
        }

        .button-container {
            position: absolute;
            bottom: 20px;
            display: flex;
            justify-content: space-between;
            width: 80%;
        }

        .button {
            background: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .button:hover {
            transform: scale(1.1);
        }

        .button i {
            font-size: 1.5em;
            color: #f44141;
        }

        .button.match i {
            color: #6bfb6b;
        }
    </style>
</head>
<body>
    <div class="card-container" id="cardContainer">
        <div class="card" data-index="1">
            <img src="imgs/profile1.jpg" alt="Profile Picture">
            <h2>Mel, 25 ans</h2>
            <p>Paris</p>
        </div>
        <div class="card" data-index="2">
            <img src="imgs/profile2.jpg" alt="Profile Picture">
            <h2>Alina, 22 ans</h2>
            <p>Paris</p>
        </div>
        <div class="card" data-index="3">
            <img src="imgs/profile3.jpg" alt="Profile Picture">
            <h2>Hina, 20 ans</h2>
            <p>Paris</p>
        </div>
    </div>

    <div class="button-container">
        <button class="button reject" onclick="swipe('left')"><i class="fas fa-times"></i></button>
        <button class="button match" onclick="swipe('right')"><i class="fas fa-heart"></i></button>
    </div>

    <script>
        const cardContainer = document.getElementById('cardContainer');
        const cards = Array.from(document.querySelectorAll('.card'));

        let startX, currentX, moveX;
        let currentCardIndex = cards.length - 1;

        cards.forEach((card, index) => {
            card.addEventListener('pointerdown', (e) => {
                startX = e.clientX;
                card.style.transition = 'none';
            });

            card.addEventListener('pointermove', (e) => {
                if (!startX) return;
                currentX = e.clientX;
                moveX = currentX - startX;
                card.style.transform = `translateX(${moveX}px) rotate(${moveX * 0.05}deg)`;
            });

            card.addEventListener('pointerup', () => {
                if (moveX > 150) {
                    swipe('right');
                } else if (moveX < -150) {
                    swipe('left');
                } else {
                    card.style.transition = 'transform 0.3s ease';
                    card.style.transform = 'translateX(0) rotate(0)';
                }
                startX = null;
            });
        });

        function swipe(direction) {
            if (currentCardIndex < 0) return;

            const card = cards[currentCardIndex];
            card.style.transition = "transform 0.3s ease, opacity 0.3s ease";

            if (direction === 'right') {
                card.style.transform = "translate(1000px, 0) rotate(30deg)";
            } else {
                card.style.transform = "translate(-1000px, 0) rotate(-30deg)";
            }

            card.style.opacity = "0";
            card.addEventListener('transitionend', () => card.remove());

            currentCardIndex--;

            updateCardStack();
        }

        function updateCardStack() {
            cards.forEach((card, index) => {
                if (index === currentCardIndex) {
                    card.style.transform = 'translateY(0) scale(1)';
                } else if (index === currentCardIndex - 1) {
                    card.style.transform = 'translateY(20px) scale(0.95)';
                } else if (index === currentCardIndex - 2) {
                    card.style.transform = 'translateY(40px) scale(0.9)';
                }
            });
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
</body>
</html>
