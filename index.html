<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notre date</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Planifier notre date</h1>
    </header>
    <main>
        <section id="step1" class="active">
            <h2>Choix de la date</h2>
            <form id="dateForm">
                <label for="date">Choisie une date : </label>
                <input type="date" id="date" name="date" required>
                <button type="button" onclick="goToStep2()">Suivant</button>
            </form>
        </section>

        <section id="step2">
            <h2>Choix du restaurant</h2>
            <div class="card-container" id="restaurantCards">
                <div class="card" onclick="toggleSelection(this, 'Restaurant Italien')">
                    <img src="imgs/italien.png" alt="Restaurant Italien">
                    <h3>Restaurant Italien</h3>
                </div>
                <div class="card" onclick="toggleSelection(this, 'Restaurant Japonnais')">
                    <img src="imgs/sushis.jpg" alt="Restaurant Japonnais">
                    <h3>Restaurant Japonnais</h3>
                </div>
                <div class="card" onclick="toggleSelection(this, 'Restaurant Coréen')">
                    <img src="imgs/coreen.jpg" alt="Restaurant Coréen">
                    <h3>Restaurant Coréen</h3>
                </div>
                <div class="card" onclick="toggleSelection(this, 'Restaurant Américain')">
                    <img src="imgs/americain.jpg" alt="Restaurant Américain">
                    <h3>Restaurant Américain</h3>
                </div>
            </div>
            <button type="button" onclick="goToConfirmation()">Suivant</button>
        </section>

        <section id="confirmation">
            <h2>Confirmation</h2>
            <form id="finalForm">
                <p><strong>Date :</strong> <span id="selectedDate"></span></p>
                <p><strong>Restaurants (dans l'ordre de sélection):</strong> <span id="selectedRestaurants"></span></p>
                <input type="hidden" name="date" id="hiddenDate">
                <input type="hidden" name="restaurants" id="hiddenRestaurants">
                <button type="button" onclick="submitForm()">Envoyer</button>
            </form>
        </section>

        <section id="thankYou">
            <h2>Merci!</h2>
            <p>On se voit le <span id="finalDate"></span> dans un <span id="finalRestaurants"></span> </p>
        </section>
    </main>

    <footer>
        <p>Fait avec ❤️</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
