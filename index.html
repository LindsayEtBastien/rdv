<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATClub Swipe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
            overflow: hidden;
        }

        .card-container {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 70%;
            overflow: hidden;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .card img {
            width: 80%;
            border-radius: 10px;
            margin-top: 20px;
        }

        .card h2 {
            font-size: 1.5em;
            margin: 15px 0;
        }

        .card p {
            color: #777;
            font-size: 1em;
        }

        .feedback {
            position: absolute;
            top: 50px;
            font-size: 3em;
            font-weight: bold;
            opacity: 0;
            color: white;
            pointer-events: none;
            transform: scale(0.8);
            transition: opacity 0.3s, transform 0.3s ease;
        }

        .feedback.like {
            left: 20px;
            transform: rotate(-20deg);
        }

        .feedback.nope {
            right: 20px;
            transform: rotate(20deg);
        }

        .background-like {
            background: rgba(102, 255, 102, 0.4); /* Vert clair */
        }

        .background-nope {
            background: rgba(255, 102, 102, 0.4); /* Rouge clair */
        }

        .controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
        }

        .button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            font-size: 1.5em;
            color: gray;
            transition: transform 0.2s ease;
        }

        .button:hover {
            transform: scale(1.1);
        }

        .button.like {
            color: green;
        }

        .button.nope {
            color: red;
        }

        .super-like {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #ff5252;
            color: white;
            font-size: 2em;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card-container" id="cardContainer">
        <div class="card" data-index="1">
            <div class="feedback like">LIKE</div>
            <div class="feedback nope">NOPE</div>
            <img src="https://via.placeholder.com/150" alt="Profile Picture">
            <h2>Mel, 25 ans</h2>
            <p>Paris</p>
        </div>
        <div class="card" data-index="2">
            <div class="feedback like">LIKE</div>
            <div class="feedback nope">NOPE</div>
            <img src="https://via.placeholder.com/150" alt="Profile Picture">
            <h2>Hina, 20 ans</h2>
            <p>Paris</p>
        </div>
        <div class="card" data-index="3">
            <div class="feedback like">SUPER LIKE</div>
            <img src="https://via.placeholder.com/150" alt="Profile Picture">
            <h2>Noah, 24 ans</h2>
            <p>Paris</p>
        </div>
    </div>

    <div class="controls" id="controls">
        <div class="button nope" id="nopeButton">✖</div>
        <div class="button like" id="likeButton">👍</div>
    </div>

    <div class="super-like" id="superLikeButton">❤</div>

    <script>
        const cardContainer = document.getElementById('cardContainer');
        const cards = Array.from(document.querySelectorAll('.card'));
        const likeButton = document.getElementById('likeButton');
        const nopeButton = document.getElementById('nopeButton');
        const superLikeButton = document.getElementById('superLikeButton');
        const controls = document.getElementById('controls');
        let currentCardIndex = cards.length - 1;

        cards.forEach((card, index) => {
            let startX = null, moveX = null;

            card.addEventListener('pointerdown', (e) => {
                startX = e.clientX;
                card.style.transition = 'none';
            });

            card.addEventListener('pointermove', (e) => {
                if (!startX || index === 2) return;

                moveX = e.clientX - startX;
                card.style.transform = `translateX(${moveX}px) rotate(${moveX * 0.05}deg)`;

                if (moveX > 0) {
                    cardContainer.classList.add('background-like');
                    cardContainer.classList.remove('background-nope');
                    card.querySelector('.like').style.opacity = '1';
                } else {
                    cardContainer.classList.add('background-nope');
                    cardContainer.classList.remove('background-like');
                    card.querySelector('.nope').style.opacity = '1';
                }
            });

            card.addEventListener('pointerup', () => {
                if (index === 2) return;

                if (moveX > 150) {
                    swipe('right', card);
                } else if (moveX < -150) {
                    swipe('left', card);
                } else {
                    resetCard(card);
                }

                cardContainer.classList.remove('background-like', 'background-nope');
            });
        });

        function swipe(direction, card) {
            card.style.transition = "transform 0.3s ease, opacity 0.3s ease";

            if (direction === 'right') {
                card.style.transform = "translate(1000px, 0) rotate(30deg)";
                card.querySelector('.like').style.opacity = '1';
            } else {
                card.style.transform = "translate(-1000px, 0) rotate(-30deg)";
                card.querySelector('.nope').style.opacity = '1';
            }

            card.style.opacity = "0";
            card.addEventListener('transitionend', () => card.remove());
            currentCardIndex--;
            checkSpecialCase();
        }

        function resetCard(card) {
            card.style.transition = 'transform 0.3s ease';
            card.style.transform = 'translateX(0) rotate(0)';
            card.querySelector('.like').style.opacity = '0';
            card.querySelector('.nope').style.opacity = '0';
        }

        function checkSpecialCase() {
            if (currentCardIndex === 0) {
                controls.style.display = 'none';
                superLikeButton.style.display = 'flex';
            }
        }

        superLikeButton.addEventListener('click', () => {
            swipe('right', cards[currentCardIndex]);
        });

        likeButton.addEventListener('click', () => swipe('right', cards[currentCardIndex]));
        nopeButton.addEventListener('click', () => swipe('left', cards[currentCardIndex]));
    </script>
</body>
</html>
